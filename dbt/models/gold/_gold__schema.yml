version: 2

models:
  - name: dim_date
    columns:
      - name: date_day
        tests: [not_null, unique]

  - name: dim_customers
    columns:
      - name: customer_unique_id
        tests: [not_null, unique]

  - name: dim_products
    columns:
      - name: product_id
        tests: [not_null, unique]

  - name: dim_sellers
    columns:
      - name: seller_id
        tests: [not_null, unique]

  - name: dim_geolocation
    columns:
      - name: geolocation_zip_code_prefix
        tests: [not_null, unique]

  - name: fct_orders
    columns:
      - name: order_id
        tests: [not_null, unique]
      - name: customer_unique_id
        tests:
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_unique_id

  - name: fct_order_items
    columns:
      - name: order_id
        tests:
          - relationships:
              arguments:
                to: ref('fct_orders')
                field: order_id
      - name: product_id
        tests:
          - relationships:
              arguments:
                to: ref('dim_products')
                field: product_id

  - name: fct_payments
    columns:
      - name: order_id
        tests:
          - relationships:
              arguments:
                to: ref('fct_orders')
                field: order_id

  - name: fct_reviews
    columns:
      - name: review_id
        tests: [not_null, unique]
      - name: order_id
        tests:
          - relationships:
              arguments:
                to: ref('fct_orders')
                field: order_id

  - name: mart_daily_revenue
    columns:
      - name: date_day
        tests: [not_null]

  - name: mart_customer_rfm
    columns:
      - name: customer_unique_id
        tests: [not_null, unique]
