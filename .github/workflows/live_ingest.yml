name: Phase B - Live ingest + transform (every 6h)

# Runs 05_live_ingest.py (bronze) then 06_live_transform.py (silver+gold),
# both pure Python — NO dbt chained here anymore. dbt still owns
# dim_customers/mart_customer_rfm/mart_daily_revenue, but on a DAILY
# cadence (see daily_gold_refresh.yml), since those need a full recompute
# and don't need 6h freshness. See live.md for the full rationale.
#
# ONE-TIME SETUP before this workflow's first scheduled run:
#   1. Make sure `dbt run` (full, all models) has completed at least once
#      (backfill.yml already does this after 04_backfill.py).
#   2. Run: python scripts/06_live_transform.py --init-cursor "<that dbt run's timestamp>"
#      This seeds live_transform_cursor so 06 doesn't try to reprocess
#      everything dbt already built. See live.md step-by-step.

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

jobs:
  live-ingest-and-transform:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write service account key
        run: echo '${{ secrets.GCP_SA_KEY_JSON }}' > service-account.json

      - name: Write .env
        run: |
          cat <<EOF > .env
          GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
          GOOGLE_APPLICATION_CREDENTIALS=${{ github.workspace }}/service-account.json
          BQ_LOCATION=${{ vars.BQ_LOCATION || 'US' }}
          BQ_RAW_DATASET=olist_raw
          BQ_BRONZE_DATASET=olist_bronze
          BQ_SILVER_DATASET=olist_silver
          BQ_GOLD_DATASET=olist_gold
          LIVE_BATCH_HOURS=6
          EOF

      - name: Run live ingest (bronze)
        run: python scripts/05_live_ingest.py

      - name: Run live transform (silver + gold, Python)
        run: python scripts/06_live_transform.py
