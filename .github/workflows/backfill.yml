name: Phase A - Backfill (manual trigger only) + dbt run

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: >
          Backfill start date (YYYY-MM-DD). Only matters for the VERY FIRST
          run — once a checkpoint exists in pipeline_state, 04_backfill.py
          auto-resumes from there and ignores this. Leave blank to use the
          default (2024-01-01).
        required: false
        default: ""
      end_date:
        description: >
          Backfill end date (YYYY-MM-DD), inclusive. Use this to cap how far
          a single run goes, to stay under the job timeout — e.g. run
          2024-01-01..2024-03-31 today, then 2024-04-01..2024-06-30 in the
          next run (start_date is ignored on that 2nd run — it auto-resumes).
          Leave blank to run all the way to today.
        required: false
        default: ""
      max_days:
        description: "Optional extra cap: max number of days processed this run, regardless of the date range above."
        required: false
        default: ""

jobs:
  backfill:
    runs-on: ubuntu-latest
    # Backfilling a full multi-year range one day at a time (each day does
    # several BigQuery load-job + SELECT round trips) can run long. Bump this
    # if you still hit the timeout even after chunking with start/end date.
    timeout-minutes: 350
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (includes dbt)
        run: pip install -r requirements.txt

      - name: Write service account key
        run: echo '${{ secrets.GCP_SA_KEY_JSON }}' > service-account.json

      - name: Write .env
        run: |
          START_DATE="${{ github.event.inputs.start_date }}"
          END_DATE="${{ github.event.inputs.end_date }}"
          START_DATE="${START_DATE:-2024-01-01}"
          cat <<EOF > .env
          GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
          GOOGLE_APPLICATION_CREDENTIALS=${{ github.workspace }}/service-account.json
          BQ_LOCATION=${{ vars.BQ_LOCATION || 'US' }}
          BQ_RAW_DATASET=olist_raw
          BQ_BRONZE_DATASET=olist_bronze
          BQ_SILVER_DATASET=olist_silver
          BQ_GOLD_DATASET=olist_gold
          HISTORICAL_STABLE_START=2017-01-01
          HISTORICAL_STABLE_END=2018-08-31
          BACKFILL_START_DATE=${START_DATE}
          BACKFILL_END_DATE=${END_DATE}
          SYNTHETIC_REPEAT_CUSTOMER_RATE=0.0312
          GROWTH_RATE_PER_YEAR=1.0
          PERTURBATION_STD=0.03
          LIVE_BATCH_HOURS=6
          EOF
          echo "Effective range for this run: start=${START_DATE} (ignored if a checkpoint already exists) end=${END_DATE:-today}"

      - name: NOTE - source CSVs
        run: |
          echo "This workflow assumes the 9 Olist CSVs are committed under data/"
          echo "or fetched by a prior step. Adjust as needed for your repo setup."

      - name: Run one-time historical load (skips per-table if already loaded)
        run: python scripts/03_load_historical_to_bronze.py

      - name: Run backfill
        run: |
          if [ -n "${{ github.event.inputs.max_days }}" ]; then
            python scripts/04_backfill.py --max-days ${{ github.event.inputs.max_days }}
          else
            python scripts/04_backfill.py
          fi

      - name: dbt deps
        working-directory: dbt
        run: dbt deps

      - name: dbt run (silver -> gold, full-refresh table rebuild)
        working-directory: dbt
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/dbt
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/service-account.json
          BQ_LOCATION: ${{ vars.BQ_LOCATION || 'US' }}
          BQ_BRONZE_DATASET: olist_bronze
          BQ_SILVER_DATASET: olist_silver
          BQ_GOLD_DATASET: olist_gold
        run: dbt run

      - name: dbt test
        working-directory: dbt
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/dbt
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/service-account.json
          BQ_LOCATION: ${{ vars.BQ_LOCATION || 'US' }}
          BQ_BRONZE_DATASET: olist_bronze
          BQ_SILVER_DATASET: olist_silver
          BQ_GOLD_DATASET: olist_gold
        run: dbt test