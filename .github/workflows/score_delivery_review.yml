name: Score Delivery & Review Risk (6h)

# Runs right after live_ingest/live_transform each 6h cycle. Rescores ALL
# currently-open / awaiting-review orders every time (see scripts/08, 09
# docstrings for why this isn't just "score new orders").

on:
  workflow_dispatch: {}
  schedule:
    - cron: "15 */6 * * *"   # 15 min after the live-ingest cron, so gold is fresh

jobs:
  score:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pip install joblib xgboost
      - name: Write service account key
        run: echo '${{ secrets.GCP_SA_KEY_JSON }}' > service-account.json
      - name: Write .env
        run: |
          cat <<EOF > .env
          GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
          GOOGLE_APPLICATION_CREDENTIALS=${{ github.workspace }}/service-account.json
          BQ_GOLD_DATASET=olist_gold
          PREDICTIONS_DATASET=olist_predictions
          EOF
      - run: python scripts/08_score_delivery_risk.py
      - run: python scripts/09_score_negative_review_risk.py
